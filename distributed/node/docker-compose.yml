services:
  wireguard-peer:
    build:
      context: ../wireguard
    container_name: wireguard-peer
    hostname: ${NODE_HOSTNAME:-wireguard-peer}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./wireguard/wg0.conf:/etc/wireguard/wg0.conf:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    command: sh -lc "wg-quick up /etc/wireguard/wg0.conf && tail -f /dev/null"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: ${NODE_HOSTNAME:-minio}
    depends_on:
      - wireguard-peer
    network_mode: service:wireguard-peer
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./minio/data:/data
      - ./minio/data2:/data2
    command: sh -lc "exec minio server --address :9000 --console-address :9001 ${MINIO_CLUSTER_ENDPOINTS:-http://10.0.0.2/data http://10.0.0.2/data2 http://10.0.0.3/data http://10.0.0.3/data2 http://10.0.0.4/data http://10.0.0.4/data2}"
    restart: unless-stopped