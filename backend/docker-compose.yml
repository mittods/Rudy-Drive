services:

  db:
    image: postgres:16

    container_name: rudy-postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: rudy-backend

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data: